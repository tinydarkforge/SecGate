name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install external scanners
        uses: ./.github/actions/install-scanners

      - name: Run smoke tests
        run: npm test

  self-scan:
    name: Self-scan via bundled action
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install external scanners
        uses: ./.github/actions/install-scanners

      - name: Run SecGate (self-scan)
        id: secgate
        uses: ./.github/actions/secgate
        with:
          target: "."
          fail-on: "critical,high"
          format: "json,html"

      - name: Upload self-scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secgate-self-scan-${{ github.run_number }}
          path: |
            secgate-v7-report.json
            *.html
          retention-days: 30
